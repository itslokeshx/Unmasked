<svg viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'SF Mono', Menlo, monospace">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a3a40" />
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b967ff" />
    </marker>
    <marker id="arrowGlow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d4a0ff">
        <animate attributeName="fill" values="#d4a0ff;#b967ff;#d4a0ff" dur="2s" repeatCount="indefinite"/>
      </path>
    </marker>

    <!-- Glow filters -->
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#b967ff" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#b967ff" flood-opacity="0.2" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Data particle gradient -->
    <radialGradient id="particleGrad">
      <stop offset="0%" stop-color="#d4a0ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#b967ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Animated grid pattern -->
    <pattern id="gridPattern" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="none"/>
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1a1a1f" stroke-width="0.5">
        <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
      </path>
    </pattern>

    <!-- Flow paths for data particles -->
    <path id="flowPath1" d="M450,135 L450,178" fill="none"/>
    <path id="flowPath2" d="M450,240 L450,278" fill="none"/>
    <path id="flowPath3" d="M450,340 L450,378" fill="none"/>
    <path id="flowPath4" d="M450,430 L450,468" fill="none"/>
    <path id="flowPath5" d="M450,520 L450,558" fill="none"/>
    <path id="flowPath6" d="M450,620 L450,658" fill="none"/>
    <path id="memoryFlow" d="M230,210 L288,210" fill="none"/>
    <path id="feedbackPath" d="M290,685 C140,685 55,520 55,400 C55,300 90,250 135,241" fill="none"/>
  </defs>

  <style>
    /* Staggered fade-in for all major groups */
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes pulseStroke {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 3px rgba(185,103,255,0.2)); }
      50% { filter: drop-shadow(0 0 8px rgba(185,103,255,0.5)); }
    }
    @keyframes shimmer {
      0% { stroke-dashoffset: 16; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .bg-grid { opacity: 0; animation: fadeIn 1.5s ease-out forwards; }

    .node-title   { opacity: 0; animation: fadeIn 0.6s ease-out forwards; }
    .node-row1    { opacity: 0; animation: fadeIn 0.6s ease-out 0.3s forwards; }
    .node-memory  { opacity: 0; animation: fadeIn 0.6s ease-out 0.5s forwards; }
    .node-row2    { opacity: 0; animation: fadeIn 0.6s ease-out 0.7s forwards, pulseGlow 3s ease-in-out 1.4s infinite; }
    .node-row3    { opacity: 0; animation: fadeIn 0.6s ease-out 0.9s forwards, pulseGlow 3s ease-in-out 1.6s infinite; }
    .node-row4    { opacity: 0; animation: fadeIn 0.6s ease-out 1.1s forwards; }
    .node-row5    { opacity: 0; animation: fadeIn 0.6s ease-out 1.3s forwards; }
    .node-row6    { opacity: 0; animation: fadeIn 0.6s ease-out 1.5s forwards, pulseGlow 3s ease-in-out 2.2s infinite; }
    .node-row7    { opacity: 0; animation: fadeIn 0.6s ease-out 1.7s forwards; }
    .node-footer  { opacity: 0; animation: fadeIn 0.8s ease-out 2.0s forwards; }

    .arrow-flow   { opacity: 0; animation: fadeIn 0.4s ease-out 1.9s forwards; }
    .accent-box rect {
      animation: pulseStroke 3s ease-in-out infinite;
    }
    .feedback-line {
      animation: shimmer 1s linear infinite;
    }
    .memory-arrow {
      animation: breathe 2.5s ease-in-out infinite;
    }
  </style>

  <!-- Background -->
  <rect x="10" y="10" width="880" height="730" rx="16" fill="#0a0a0c" stroke="#1f1f23" stroke-width="1.5"/>
  <rect class="bg-grid" x="10" y="10" width="880" height="730" rx="16" fill="url(#gridPattern)"/>

  <!-- Subtle corner accents -->
  <line x1="20" y1="30" x2="50" y2="30" stroke="#b967ff" stroke-width="1" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="20" y1="30" x2="20" y2="60" stroke="#b967ff" stroke-width="1" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="860" y1="720" x2="880" y2="720" stroke="#b967ff" stroke-width="1" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="880" y1="700" x2="880" y2="720" stroke="#b967ff" stroke-width="1" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- Title -->
  <g class="node-title">
    <text x="450" y="42" text-anchor="middle" fill="#e8e8ea" font-size="19" font-weight="700">UNMASKED — Conversational RAG Pipeline</text>
    <text x="450" y="60" text-anchor="middle" fill="#6b6b70" font-size="11">per-character knowledge base · multi-turn session memory</text>
  </g>

  <!-- Row 1: USER QUERY -->
  <g class="node-row1">
    <rect x="290" y="85" width="320" height="50" rx="10" fill="#131316" stroke="#2a2a2f" stroke-width="1.2"/>
    <text x="450" y="106" text-anchor="middle" fill="#e8e8ea" font-size="13" font-weight="700">USER QUERY</text>
    <text x="450" y="122" text-anchor="middle" fill="#6b6b70" font-size="10">raw follow-up question</text>
    <!-- Subtle scan line -->
    <rect x="295" y="90" width="4" height="40" rx="2" fill="#b967ff" opacity="0">
      <animate attributeName="x" values="295;601" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.15;0.15;0" dur="2.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Session Memory (side box) -->
  <g class="node-memory">
    <rect x="40" y="180" width="190" height="60" rx="10" fill="#131316" stroke="#3a3a40" stroke-width="1.2"/>
    <text x="135" y="204" text-anchor="middle" fill="#e8e8ea" font-size="12" font-weight="700">SESSION MEMORY</text>
    <text x="135" y="222" text-anchor="middle" fill="#6b6b70" font-size="10">chat_history · by session_id</text>
    <!-- Memory indicator dots -->
    <circle cx="55" cy="232" r="2" fill="#b967ff" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="63" cy="232" r="2" fill="#b967ff" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="71" cy="232" r="2" fill="#b967ff" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Row 2: HISTORY-AWARE RETRIEVER -->
  <g class="node-row2 accent-box">
    <rect x="290" y="180" width="320" height="60" rx="10" fill="#1b1024" stroke="#b967ff" stroke-width="1.5"/>
    <text x="450" y="204" text-anchor="middle" fill="#c98bff" font-size="13" font-weight="700">◆ HISTORY-AWARE RETRIEVER</text>
    <text x="450" y="222" text-anchor="middle" fill="#8a6aa8" font-size="10">rewrites into a standalone query</text>
  </g>

  <!-- Row 3: CHROMADB VECTOR SEARCH -->
  <g class="node-row3 accent-box">
    <rect x="290" y="280" width="320" height="60" rx="10" fill="#1b1024" stroke="#b967ff" stroke-width="1.5"/>
    <text x="450" y="304" text-anchor="middle" fill="#c98bff" font-size="13" font-weight="700">◆ CHROMADB VECTOR SEARCH</text>
    <text x="450" y="322" text-anchor="middle" fill="#8a6aa8" font-size="10">cosine similarity · top-k chunks</text>
  </g>

  <!-- Row 4: RETRIEVED CONTEXT -->
  <g class="node-row4">
    <rect x="290" y="380" width="320" height="50" rx="10" fill="#131316" stroke="#2a2a2f" stroke-width="1.2"/>
    <text x="450" y="401" text-anchor="middle" fill="#e8e8ea" font-size="13" font-weight="700">RETRIEVED CONTEXT</text>
    <text x="450" y="417" text-anchor="middle" fill="#6b6b70" font-size="10">character-specific knowledge chunks</text>
  </g>

  <!-- Row 5: DOCUMENT CHAIN -->
  <g class="node-row5">
    <rect x="290" y="470" width="320" height="50" rx="10" fill="#131316" stroke="#2a2a2f" stroke-width="1.2"/>
    <text x="450" y="491" text-anchor="middle" fill="#e8e8ea" font-size="13" font-weight="700">DOCUMENT CHAIN</text>
    <text x="450" y="507" text-anchor="middle" fill="#6b6b70" font-size="10">stuffs chunks into {context}</text>
  </g>

  <!-- Row 6: UNMASKED PROMPT + GROQ LLM -->
  <g class="node-row6 accent-box">
    <rect x="290" y="560" width="320" height="60" rx="10" fill="#1b1024" stroke="#b967ff" stroke-width="1.5"/>
    <text x="450" y="584" text-anchor="middle" fill="#c98bff" font-size="13" font-weight="700">◆ UNMASKED PROMPT + GROQ LLM</text>
    <text x="450" y="602" text-anchor="middle" fill="#8a6aa8" font-size="10">Llama 3.1 8B · persona-grounded generation</text>
  </g>

  <!-- Row 7: GROUNDED RESPONSE -->
  <g class="node-row7">
    <rect x="290" y="660" width="320" height="50" rx="10" fill="#131316" stroke="#2a2a2f" stroke-width="1.2"/>
    <text x="450" y="681" text-anchor="middle" fill="#e8e8ea" font-size="13" font-weight="700">GROUNDED RESPONSE</text>
    <text x="450" y="697" text-anchor="middle" fill="#6b6b70" font-size="10">printed to the CLI</text>
  </g>

  <!-- Vertical flow arrows with animated particles -->
  <g class="arrow-flow">
    <!-- Arrow 1: Query → Retriever -->
    <line x1="450" y1="135" x2="450" y2="178" stroke="#3a3a40" stroke-width="1.5" marker-end="url(#arrow)"/>
    <circle r="3" fill="url(#particleGrad)" filter="url(#glowSoft)">
      <animateMotion dur="1.5s" repeatCount="indefinite" begin="0s">
        <mpath href="#flowPath1"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="0s"/>
    </circle>

    <!-- Arrow 2: Retriever → ChromaDB -->
    <line x1="450" y1="240" x2="450" y2="278" stroke="#3a3a40" stroke-width="1.5" marker-end="url(#arrow)"/>
    <circle r="3" fill="url(#particleGrad)" filter="url(#glowSoft)">
      <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.25s">
        <mpath href="#flowPath2"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="0.25s"/>
    </circle>

    <!-- Arrow 3: ChromaDB → Context -->
    <line x1="450" y1="340" x2="450" y2="378" stroke="#3a3a40" stroke-width="1.5" marker-end="url(#arrow)"/>
    <circle r="3" fill="url(#particleGrad)" filter="url(#glowSoft)">
      <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.5s">
        <mpath href="#flowPath3"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>

    <!-- Arrow 4: Context → Document Chain -->
    <line x1="450" y1="430" x2="450" y2="468" stroke="#3a3a40" stroke-width="1.5" marker-end="url(#arrow)"/>
    <circle r="3" fill="url(#particleGrad)" filter="url(#glowSoft)">
      <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.75s">
        <mpath href="#flowPath4"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
    </circle>

    <!-- Arrow 5: Document Chain → LLM -->
    <line x1="450" y1="520" x2="450" y2="558" stroke="#3a3a40" stroke-width="1.5" marker-end="url(#arrow)"/>
    <circle r="3" fill="url(#particleGrad)" filter="url(#glowSoft)">
      <animateMotion dur="1.5s" repeatCount="indefinite" begin="1.0s">
        <mpath href="#flowPath5"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="1.0s"/>
    </circle>

    <!-- Arrow 6: LLM → Response -->
    <line x1="450" y1="620" x2="450" y2="658" stroke="#3a3a40" stroke-width="1.5" marker-end="url(#arrow)"/>
    <circle r="3" fill="url(#particleGrad)" filter="url(#glowSoft)">
      <animateMotion dur="1.5s" repeatCount="indefinite" begin="1.25s">
        <mpath href="#flowPath6"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="1.25s"/>
    </circle>

    <!-- Memory → Retriever arrow with glowing particle -->
    <line class="memory-arrow" x1="230" y1="210" x2="288" y2="210" stroke="#b967ff" stroke-width="1.5" marker-end="url(#arrowGlow)"/>
    <circle r="3" fill="#d4a0ff" filter="url(#glowPurple)">
      <animateMotion dur="1.8s" repeatCount="indefinite">
        <mpath href="#memoryFlow"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
    </circle>

    <!-- Feedback loop: response → memory (dashed, animated) -->
    <path class="feedback-line" d="M290,685 C140,685 55,520 55,400 C55,300 90,250 135,241"
          fill="none" stroke="#b967ff" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#arrowGlow)"/>
    <!-- Feedback particle -->
    <circle r="3.5" fill="#d4a0ff" filter="url(#glowPurple)">
      <animateMotion dur="3.5s" repeatCount="indefinite">
        <mpath href="#feedbackPath"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;4;2" dur="3.5s" repeatCount="indefinite"/>
    </circle>

    <text x="30" y="460" fill="#6b6b70" font-size="10" transform="rotate(-90 30 460)">saved after every turn</text>
  </g>

  <!-- Footer -->
  <g class="node-footer">
    <text x="450" y="726" text-anchor="middle" fill="#6b6b70" font-size="11">◆ core retrieval &amp; generation components   ·   memory persists per session_id</text>
  </g>
</svg>
