<svg viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'SF Mono', Menlo, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a3a40" />
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b967ff" />
    </marker>
  </defs>

  <rect x="10" y="10" width="880" height="730" rx="16" fill="#0a0a0c" stroke="#1f1f23" stroke-width="1.5"/>

  <text x="450" y="42" text-anchor="middle" fill="#e8e8ea" font-size="19" font-weight="700">UNMASKED — Conversational RAG Pipeline</text>
  <text x="450" y="60" text-anchor="middle" fill="#6b6b70" font-size="11">per-character knowledge base · multi-turn session memory</text>

  <!-- Session Memory (side box) -->
  <rect x="40" y="180" width="190" height="60" rx="10" fill="#131316" stroke="#3a3a40" stroke-width="1.2"/>
  <text x="135" y="204" text-anchor="middle" fill="#e8e8ea" font-size="12" font-weight="700">SESSION MEMORY</text>
  <text x="135" y="222" text-anchor="middle" fill="#6b6b70" font-size="10">chat_history · by session_id</text>

  <!-- Row 1 -->
  <rect x="290" y="85" width="320" height="50" rx="10" fill="#131316" stroke="#2a2a2f" stroke-width="1.2"/>
  <text x="450" y="106" text-anchor="middle" fill="#e8e8ea" font-size="13" font-weight="700">USER QUERY</text>
  <text x="450" y="122" text-anchor="middle" fill="#6b6b70" font-size="10">raw follow-up question</text>

  <!-- Row 2 -->
  <rect x="290" y="180" width="320" height="60" rx="10" fill="#1b1024" stroke="#b967ff" stroke-width="1.5"/>
  <text x="450" y="204" text-anchor="middle" fill="#c98bff" font-size="13" font-weight="700">◆ HISTORY-AWARE RETRIEVER</text>
  <text x="450" y="222" text-anchor="middle" fill="#8a6aa8" font-size="10">rewrites into a standalone query</text>

  <!-- Row 3 -->
  <rect x="290" y="280" width="320" height="60" rx="10" fill="#1b1024" stroke="#b967ff" stroke-width="1.5"/>
  <text x="450" y="304" text-anchor="middle" fill="#c98bff" font-size="13" font-weight="700">◆ CHROMADB VECTOR SEARCH</text>
  <text x="450" y="322" text-anchor="middle" fill="#8a6aa8" font-size="10">cosine similarity · top-k chunks</text>

  <!-- Row 4 -->
  <rect x="290" y="380" width="320" height="50" rx="10" fill="#131316" stroke="#2a2a2f" stroke-width="1.2"/>
  <text x="450" y="401" text-anchor="middle" fill="#e8e8ea" font-size="13" font-weight="700">RETRIEVED CONTEXT</text>
  <text x="450" y="417" text-anchor="middle" fill="#6b6b70" font-size="10">character-specific knowledge chunks</text>

  <!-- Row 5 -->
  <rect x="290" y="470" width="320" height="50" rx="10" fill="#131316" stroke="#2a2a2f" stroke-width="1.2"/>
  <text x="450" y="491" text-anchor="middle" fill="#e8e8ea" font-size="13" font-weight="700">DOCUMENT CHAIN</text>
  <text x="450" y="507" text-anchor="middle" fill="#6b6b70" font-size="10">stuffs chunks into {context}</text>

  <!-- Row 6 -->
  <rect x="290" y="560" width="320" height="60" rx="10" fill="#1b1024" stroke="#b967ff" stroke-width="1.5"/>
  <text x="450" y="584" text-anchor="middle" fill="#c98bff" font-size="13" font-weight="700">◆ UNMASKED PROMPT + GROQ LLM</text>
  <text x="450" y="602" text-anchor="middle" fill="#8a6aa8" font-size="10">Llama 3.1 8B · persona-grounded generation</text>

  <!-- Row 7 -->
  <rect x="290" y="660" width="320" height="50" rx="10" fill="#131316" stroke="#2a2a2f" stroke-width="1.2"/>
  <text x="450" y="681" text-anchor="middle" fill="#e8e8ea" font-size="13" font-weight="700">GROUNDED RESPONSE</text>
  <text x="450" y="697" text-anchor="middle" fill="#6b6b70" font-size="10">printed to the CLI</text>

  <!-- Vertical flow arrows -->
  <line x1="450" y1="135" x2="450" y2="178" stroke="#3a3a40" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="240" x2="450" y2="278" stroke="#3a3a40" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="340" x2="450" y2="378" stroke="#3a3a40" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="430" x2="450" y2="468" stroke="#3a3a40" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="520" x2="450" y2="558" stroke="#3a3a40" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="620" x2="450" y2="658" stroke="#3a3a40" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Memory feeds the rewrite step -->
  <line x1="230" y1="210" x2="288" y2="210" stroke="#b967ff" stroke-width="1.5" marker-end="url(#arrowAccent)"/>

  <!-- Feedback loop: response saved back to memory -->
  <path d="M290,685 C140,685 55,520 55,400 C55,300 90,250 135,241"
        fill="none" stroke="#b967ff" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#arrowAccent)"/>
  <text x="30" y="460" fill="#6b6b70" font-size="10" transform="rotate(-90 30 460)">saved after every turn</text>

  <text x="450" y="726" text-anchor="middle" fill="#6b6b70" font-size="11">◆ core retrieval &amp; generation components   ·   memory persists per session_id</text>
</svg>
